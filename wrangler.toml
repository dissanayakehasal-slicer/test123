name = "live-launch-countdown"
compatibility_date = "2026-06-23"
main = "worker.js"

# If you want Wrangler to upload static assets built by Nitro, set the `site.bucket`
# to the public output folder. The Nitro/Vite build used by this project places
# static assets in `.output/public` by default.
site = { bucket = ".output/public" }

workers_dev = true

# Declare the D1 database binding named LAUNCH_DB. Replace `database_name` with
# your D1 database name in Cloudflare when provisioning.
[[d1_databases]]
binding = "LAUNCH_DB"
database_name = "live_launch_db"
database_id = "ad58d46b-82ac-4698-b047-171ae35e1b2c"
